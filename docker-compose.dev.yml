services:

  db:
    env_file:
      - .env.dev

  backend:
    build:
      target: base
    env_file:
      - .env.dev
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings.dev
    depends_on:
      - db
      - frontend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: