server {
    listen 80;
    server_name tsvm2026.duckdns.org;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tsvm2026.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/tsvm2026.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tsvm2026.duckdns.org/privkey.pem;

    # React app root
    root /usr/share/nginx/html;
    index index.html;

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all: serve React app for frontend routing
    location / {
        try_files $uri /index.html;
    }

    # Serve Django static files
    location /django_static/ {
        alias /static/;   # maps URL /static/ → /static/ on container
    }

    # Proxy API requests to Django
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}